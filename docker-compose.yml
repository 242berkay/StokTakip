services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q 'SELECT 1' -b -o /dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q 'SELECT 1' -b -o /dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build: .
    environment:
      DJANGO_SECRET_KEY: "change-me"
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_ENGINE: "mssql"
      DB_NAME: "StokTakip"
      DB_USER: "sa"
      DB_PASSWORD: "YourStrong!Passw0rd"
      DB_HOST: "db"
      DB_PORT: "1433"
      DB_ODBC_DRIVER: "ODBC Driver 18 for SQL Server"
      DB_EXTRA_PARAMS: "TrustServerCertificate=yes"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  mssql_data:
